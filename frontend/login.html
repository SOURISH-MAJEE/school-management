<!DOCTYPE html>
<html>
<head>
    <title>Login - School MS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-box">
    <h1 class="title">School Management</h1>

    <div class="user-tabs">
        <button class="user-tab active"
            onclick="switchUser('teacher', this)">
            Teacher
        </button>
        <button class="user-tab"
            onclick="switchUser('student', this)">
            Student
        </button>
    </div>

    <div class="card">

        <div id="teacher-section">
            <div class="action-tabs">
                <button class="action-tab active"
                    onclick="switchAction('teacher', 'login', this)">
                    Login
                </button>
                <button class="action-tab"
                    onclick="switchAction('teacher', 'signup', this)">
                    Sign Up
                </button>
            </div>

            <div id="teacher-login" class="form-section active">
                <div id="t-login-msg" class="msg"></div>
                <input id="tl-email" type="email" placeholder="Enter Email" />
                <input id="tl-password" type="password" placeholder="Enter Password" />
                <button onclick="teacherLogin()">Login</button>
            </div>

            <div id="teacher-signup" class="form-section">
                <div id="t-signup-msg" class="msg"></div>
                <input id="ts-name" placeholder="Full Name" />
                <input id="ts-age" placeholder="Age" type="number" />
                <select id="ts-gender">
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
                <input id="ts-email" type="email" placeholder="Email" />
                <input id="ts-phone" placeholder="Phone Number" />
                <input id="ts-password" type="password" placeholder="Create Password" />
                <input id="ts-confirm" type="password" placeholder="Confirm Password" />
                <button onclick="teacherSignup()">Create Account</button>
            </div>
        </div>

        <div id="student-section" style="display:none">
            <div class="action-tabs">
                <button class="action-tab active"
                    onclick="switchAction('student', 'login', this)">
                    Login
                </button>
                <button class="action-tab"
                    onclick="switchAction('student', 'signup', this)">
                    Sign Up
                </button>
            </div>

            <div id="student-login" class="form-section active">
                <div id="s-login-msg" class="msg"></div>
                <input id="sl-roll" placeholder="Enter Roll Number" />
                <input id="sl-password" type="password" placeholder="Enter Password" />
                <button onclick="studentLogin()">Login</button>
            </div>

            <div id="student-signup" class="form-section">
                <div id="s-signup-msg" class="msg"></div>
                <input id="ss-roll" placeholder="Roll Number" />
                <input id="ss-name" placeholder="Full Name" />
                <input id="ss-age" placeholder="Age" type="number" />
                <select id="ss-gender">
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
                <input id="ss-phone" placeholder="Phone Number" />
                <select id="ss-class">
                    <option value="">Select Class</option>
                </select>
                <input id="ss-password" type="password" placeholder="Create Password" />
                <input id="ss-confirm" type="password" placeholder="Confirm Password" />
                <button onclick="studentSignup()">Create Account</button>
            </div>
        </div>

    </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
