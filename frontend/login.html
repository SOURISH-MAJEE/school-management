<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-box { max-width:400px; margin:80px auto; }
        .tab-btns { display:flex; margin-bottom:20px; }
        .tab-btn { flex:1; padding:12px; border:none; cursor:pointer; font-size:15px; background:#ddd; }
        .tab-btn.active { background:#000000; color:white; }
        .tab-btn:first-child { border-radius:5px 0 0 5px; }
        .tab-btn:last-child  { border-radius:0 5px 5px 0; }
        .form { display:none; }
        .form.active { display:block; }
        .form input { width:100%; padding:10px; margin:8px 0; border:1px solid #ddd; border-radius:5px; box-sizing:border-box; }
        .form button { width:100%; padding:12px; background:#2c3e50; color:white; border:none; border-radius:5px; font-size:15px; cursor:pointer; margin-top:5px; }
        .form button:hover { background:#3498db; }
        .title { text-align:center; margin-bottom:25px; color:#2c3e50; }
    </style>
</head>
<body>

<div class="login-box">
    <h1 class="title">School Management</h1>

    <div class="tab-btns">
        <button class="tab-btn active" onclick="switchTab('teacher', this)">
            Teacher Login
        </button>
        <button class="tab-btn" onclick="switchTab('student', this)">
            Student Login
        </button>
    </div>

    <div class="card">

        <!-- TEACHER FORM -->
        <div id="teacher-form" class="form active">
            <h2>Teacher Login</h2>
            <div id="t-msg" class="msg"></div>
            <input id="t-email" type="email" placeholder="Enter your Email" />
            <input id="t-password" type="password" placeholder="Enter your Password" />
            <button onclick="teacherLogin()">Login</button>
        </div>

        <!-- STUDENT FORM -->
        <div id="student-form" class="form">
            <h2>Student Login</h2>
            <div id="s-msg" class="msg"></div>
            <input id="s-roll" type="text" placeholder="Enter your Roll Number" />
            <input id="s-password" type="password" placeholder="Enter your Password" />
            <button onclick="studentLogin()">Login</button>
        </div>

    </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
