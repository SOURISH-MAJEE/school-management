<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <a href="index.html">Dashboard</a>
    <a href="teachers.html">Teachers</a>
    <a href="students.html" class="active">Students</a>
    <a href="subjects.html">Subjects</a>
    <a href="classes.html">Classes</a>
    <a href="attendance.html">Attendance</a>
</nav>

<div class="container">
    <h1>Students</h1>

    <div class="card">
        <h2>Add Student</h2>
        <div id="s-msg" class="msg"></div>
        <input id="s-roll" placeholder="Roll Number" />
        <input id="s-name" placeholder="Name" />
        <input id="s-age" placeholder="Age" type="number" />
        <select id="s-gender">
            <option value="">Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>
        <input id="s-phone" placeholder="Phone" />
        <select id="s-class"><option value="">Select Class</option></select>
        <br>
        <button onclick="addStudent()">Add Student</button>
    </div>

    <div class="card">
        <h2>All Students</h2>
        <table>
            <thead>
                <tr>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Gender</th>
                    <th>Phone</th>
                    <th>Class</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="s-list"></tbody>
        </table>
    </div>
</div>

<script src="js/students.js"></script>
</body>
</html>
